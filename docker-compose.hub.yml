# Docker Compose using pre-built Docker Hub image
# Copy this file and customize with your .env and providers.yaml

services:
  pypowerwall:
    image: jasonacox/pypowerwall:latest
    container_name: pypowerwall
    restart: always
    env_file: .env
    ports:
      - "${PYPOWERWALL_PORT:-8675}:8675"

  nut-upsd:
    image: instantlinux/nut-upsd:latest
    container_name: nut-upsd
    restart: always
    privileged: true
    volumes:
      - ./nut-config:/etc/nut
      - ups_status:/var/lib/nut/ups
    ports:
      - "${NUT_UPSD_PORT:-3493}:3493"

  powerwall-bridge:
    # Use pre-built image from Docker Hub instead of building locally
    image: darthbert/tesla-ups-bridge:latest
    # Or specific version: darthbert/tesla-ups-bridge:v1.2.3
    container_name: powerwall-bridge
    restart: always
    env_file: .env
    volumes:
      # Mount your local configuration files
      - ./providers.yaml:/app/providers.yaml:ro
      - ups_status:/var/lib/nut/ups
    ports:
      - "${BRIDGE_PORT:-8000}:8000"
    depends_on:
      - pypowerwall

volumes:
  ups_status:
