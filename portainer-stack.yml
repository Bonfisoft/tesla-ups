version: "3.8"

# SYNLOGY NAS PATHS:
# If your Docker directory is on a different volume, update the path:
# - /volume1/docker/tesla-ups  (Volume 1)
# - /volume2/docker/tesla-ups  (Volume 2)
# - /volume3/docker/tesla-ups  (Volume 3)

services:
  pypowerwall:
    image: jasonacox/pypowerwall:latest
    container_name: pypowerwall
    restart: always
    environment:
      - "PW_HOST=${PW_HOST}"
      - "PW_EMAIL=${PW_EMAIL}"
      - "PW_PASSWORD=${PW_PASSWORD}"
    ports:
      - "${PW_PORT:-8675}:8675"

  # nut-upsd is OPTIONAL - only needed for REPORTING_MODE=upsd
  # For REPORTING_MODE=nut (default), the bridge provides native NUT protocol
  # For REPORTING_MODE=snmp, no NUT server is needed at all
  nut-upsd:
    image: instantlinux/nut-upsd:latest
    container_name: nut-upsd
    restart: always
    privileged: true
    volumes:
      - /volume1/docker/tesla-ups/nut-config:/etc/nut
      - ups_status:/var/lib/nut/ups
    environment:
      - "UPS_NAME=${UPS_NAME:-powerwall}"
      - "UPS_DRIVER=${UPS_DRIVER:-dummy-ups}"
    ports:
      - "${NUT_PORT:-3493}:3493"
    profiles:
      - upsd  # Only start with: docker-compose --profile upsd up
    depends_on:
      powerwall-bridge:
        condition: service_healthy

  powerwall-bridge:
    image: darthbert/tesla-ups-bridge:latest
    container_name: powerwall-bridge
    restart: always
    # For SNMP on standard port 161, use host network mode instead of port mapping:
    # network_mode: host
    # Then set SNMP_PORT=161 in .env and use NAS IP without port in DSM
    environment:
      # Reporting Mode: nut (default), snmp, or upsd
      - "REPORTING_MODE=${REPORTING_MODE:-nut}"
      - "NUT_SERVER_PORT=${NUT_SERVER_PORT:-3493}"

      # Multi-Provider Configuration
      # Provider 1 (Main House)
      - "PROVIDER_1_TYPE=${PROVIDER_1_TYPE:-powerwall}"
      - "PROVIDER_1_PROXY_URL=${PROVIDER_1_PROXY_URL:-http://pypowerwall:8675}"
      - "PROVIDER_1_TIMEOUT=${PROVIDER_1_TIMEOUT:-10}"
      - "PROVIDER_1_NAME=${PROVIDER_1_NAME:-Main House}"

      # Provider 2 (Optional - uncomment and set in .env for multiple Powerwalls)
      # - "PROVIDER_2_TYPE=${PROVIDER_2_TYPE:-powerwall}"
      # - "PROVIDER_2_PROXY_URL=${PROVIDER_2_PROXY_URL}"
      # - "PROVIDER_2_TIMEOUT=${PROVIDER_2_TIMEOUT:-10}"
      # - "PROVIDER_2_NAME=${PROVIDER_2_NAME}"

      # SMTP / Email Notifications
      - "SMTP_SERVER=${SMTP_SERVER}"
      - "SMTP_PORT=${SMTP_PORT:-587}"
      - "EMAIL_USER=${EMAIL_USER}"
      - "EMAIL_PASS=${EMAIL_PASS}"
      - "NOTIFY_TO=${NOTIFY_TO}"

      # Internationalization
      - "DEFAULT_LANGUAGE=${DEFAULT_LANGUAGE:-en}"

      # Optional: Polling interval in seconds (default: 15)
      - "POLL_INTERVAL=${POLL_INTERVAL:-15}"

      # SNMP Settings for Synology DSM UPS monitoring
      - "SNMP_COMMUNITY=${SNMP_COMMUNITY:-public}"
      - "SNMP_PORT=${SNMP_PORT:-1161}"
    volumes:
      - ups_status:/var/lib/nut/ups
    ports:
      - "${BRIDGE_PORT:-8100}:8100"
      # Port 3493 only needed for REPORTING_MODE=nut (native NUT server)
      - "${NUT_PORT:-3493}:3493"
      # Port 1161 only needed for REPORTING_MODE=snmp or upsd
      - "${SNMP_PORT:-1161}:${SNMP_PORT:-1161}/udp"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      pypowerwall:
        condition: service_started

volumes:
  ups_status:
