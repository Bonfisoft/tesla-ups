# Docker Compose using pre-built Docker Hub image
# All configuration via environment variables (no providers.yaml needed)

services:
  pypowerwall:
    image: jasonacox/pypowerwall:latest
    container_name: pypowerwall
    restart: always
    env_file: .env
    ports:
      - "${PW_PORT:-8675}:8675"

  nut-upsd:
    image: instantlinux/nut-upsd:latest
    container_name: nut-upsd
    restart: always
    privileged: true
    volumes:
      - ./nut-config:/etc/nut
      - ups_status:/var/lib/nut/ups
    ports:
      - "${NUT_PORT:-3493}:3493"

  powerwall-bridge:
    # Use pre-built image from Docker Hub instead of building locally
    image: darthbert/tesla-ups-bridge:latest
    # Or specific version: darthbert/tesla-ups-bridge:v1.0.3
    container_name: powerwall-bridge
    restart: always
    env_file: .env
    volumes:
      - ups_status:/var/lib/nut/ups
    ports:
      - "${BRIDGE_PORT:-8000}:8000"
      - "${SNMP_PORT:-161}:161/udp"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      pypowerwall:
        condition: service_started

volumes:
  ups_status:
