services:
  pypowerwall:
    image: jasonacox/pypowerwall:latest
    container_name: pypowerwall
    restart: always
    env_file: .env
    ports:
      - "${PYPOWERWALL_PORT:-8675}:8675"

  nut-upsd:
    image: instantlinux/nut-upsd:latest
    container_name: nut-upsd
    restart: always
    privileged: true
    volumes:
      - ./nut-config:/etc/nut
      - ups_status:/var/lib/nut/ups
    ports:
      - "${NUT_UPSD_PORT:-3493}:3493"

  powerwall-bridge:
    build: .
    container_name: powerwall-bridge
    restart: always
    env_file: .env
    volumes:
      - ./bridge.py:/app/bridge.py
      - ./providers:/app/providers
      - ups_status:/var/lib/nut/ups
    ports:
      - "${BRIDGE_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      pypowerwall:
        condition: service_started

volumes:
  ups_status:
